version: '3.8'
services:
  db:
    image: postgres:15
    container_name: lanchonete_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_forte_itajaí
      POSTGRES_DB: sistema_gestao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: